<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaDrop — Login / Sign Up</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo"><div class="logo-icon">💡</div><span>Idea<strong>Drop</strong></span></a>
    <div class="nav-actions"><span id="authSlot"></span></div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">Login</button>
        <button class="auth-tab" id="signupTab" onclick="switchAuthTab('signup')">Sign Up</button>
      </div>
      <div id="loginForm">
        <h2>Welcome back</h2>
        <p class="auth-sub">Sign in to your IdeaDrop account</p>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"/></div>
        <button class="btn-primary btn-full" id="loginBtn">Sign in →</button>
        <p class="auth-switch">No account? <a href="#" onclick="switchAuthTab('signup')">Sign up free</a></p>
      </div>
      <div id="signupForm" style="display:none">
        <h2>Create your account</h2>
        <p class="auth-sub">Start validating your ideas for free</p>
        <div class="form-group"><label>Full name</label><input type="text" id="signupName" placeholder="John Doe"/></div>
        <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="Min. 8 characters"/></div>
        <button class="btn-primary btn-full" id="signupBtn">Create account →</button>
        <p class="auth-switch">Already have an account? <a href="#" onclick="switchAuthTab('login')">Sign in</a></p>
      </div>
      <div id="authMessage" class="auth-message"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
